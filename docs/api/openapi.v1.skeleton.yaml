openapi: 3.1.0
info:
  title: HR Space API v1
  version: 1.0.0
  description: >
    API v1 contract skeleton for HR Space – AI-powered HR Toolbox.

    operationId maps to service_command.
    All write/action endpoints require Idempotency-Key header.
    Entities with optimistic concurrency accept If-Unmodified-Since header.

servers:
  - url: /api/v1

tags:
  - name: Auth
  - name: Work
  - name: Inbox
  - name: People
  - name: Documents
  - name: Contracts
  - name: Templates
  - name: AI
  - name: Notifications
  - name: Notes
  - name: Audit
  - name: Reports
  - name: Search
  - name: Admin
  - name: Jobs

security:
  - cookieAuth: []

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: httpOnly JWT cookie, set via /auth/login

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: Required for write/action endpoints. Same key + same user + same route + same payload hash = idempotent. Different payload = 409.
    IfUnmodifiedSince:
      name: If-Unmodified-Since
      in: header
      required: false
      schema:
        type: string
        format: date-time
      description: Optimistic concurrency guard. 409 if entity updated after this timestamp.
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Size:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Sort:
      name: sort
      in: query
      schema:
        type: string
      description: Comma-separated sort fields. Prefix - for DESC. e.g. "-updated_at,created_at"
    StatusFilter:
      name: status
      in: query
      schema:
        type: string
      description: Comma-separated status values.
    OwnerId:
      name: owner_id
      in: query
      schema:
        type: string
        format: uuid
    TypeFilter:
      name: type
      in: query
      schema:
        type: string
      description: Comma-separated type values.
    SourceFilter:
      name: source
      in: query
      schema:
        type: string
    CreatedFrom:
      name: created_from
      in: query
      schema:
        type: string
        format: date-time
    CreatedTo:
      name: created_to
      in: query
      schema:
        type: string
        format: date-time
    DueBefore:
      name: due_before
      in: query
      schema:
        type: string
        format: date-time
    DueAfter:
      name: due_after
      in: query
      schema:
        type: string
        format: date-time
    SearchQuery:
      name: q
      in: query
      schema:
        type: string
    WorkId:
      name: workId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InboxId:
      name: inboxId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PeopleId:
      name: peopleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ContractId:
      name: contractId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TemplateId:
      name: templateId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    NotificationId:
      name: notificationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    NoteId:
      name: noteId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SuggestionId:
      name: suggestionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    JobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LinkType:
      name: link_type
      in: query
      required: true
      schema:
        type: string
        enum: [parent_child, dependency, blocker, related]

  schemas:
    # ============================================================
    # ENUMS
    # ============================================================
    WorkItemStatus:
      type: string
      enum: [active, in_progress, waiting, completed, reopened, archived]
    WorkItemSource:
      type: string
      enum: [inbox, system, manual, dependent]
    WorkLinkType:
      type: string
      enum: [parent_child, dependency, blocker, related]
    DecisionLabel:
      type: string
      enum: [Critical, Attention, Planned, Waiting]
    InboxItemSource:
      type: string
      enum: [email, file_upload, manual, api, system]
    InboxItemStatus:
      type: string
      enum: [new, triaged, dismissed]
    PeopleType:
      type: string
      enum: [employee, candidate, contact]
    PeopleStatus:
      type: string
      enum: [active, inactive, archived]
    PeopleSource:
      type: string
      enum: [manual, import, sync, recruitment, system]
    EmploymentStatus:
      type: string
      enum: [active, resigned, terminated, suspended]
    DocumentType:
      type: string
      enum: [id_card, diploma, certificate, photo, contract_related, other]
    DocumentStatus:
      type: string
      enum: [uploaded, verified, rejected, expired]
    ContractType:
      type: string
      enum: [offer, labor_contract, nda, amendment, termination, other]
    ContractStatus:
      type: string
      enum: [draft, ready, sent, signed, expired, terminated, cancelled]
    TemplateType:
      type: string
      enum: [contract, document, checklist, task]
    TemplateScope:
      type: string
      enum: [org_default, position, department]
    SuggestionType:
      type: string
      enum: [extraction, draft, classification, fill, summary]
    SuggestionStatus:
      type: string
      enum: [pending, accepted, rejected, superseded]
    ConfidenceLabel:
      type: string
      enum: [high, medium, low]
    EntityType:
      type: string
      enum: [work_item, inbox_item, people, document, contract]
    AIEntityType:
      type: string
      enum: [work_item, inbox_item, document, contract, people]
    NotificationType:
      type: string
      enum: [reminder, alert, daily_brief, system]
    NotificationStatus:
      type: string
      enum: [pending, sent, read, dismissed, snoozed]
    AuditSource:
      type: string
      enum: [manual, ai_suggestion, system]
    UserRole:
      type: string
      enum: [super_admin, hr_admin, hr_staff]
    JobStatus:
      type: string
      enum: [queued, running, completed, failed]
    ErrorCode:
      type: string
      enum: [VALIDATION_ERROR, PERMISSION_DENIED, RESOURCE_NOT_FOUND,
             INVALID_STATUS_TRANSITION, DUPLICATE_RESOURCE, CONFLICT,
             AI_SUGGESTION_MISMATCH, IDEMPOTENCY_CONFLICT, INTERNAL_ERROR]

    # ============================================================
    # DOMAIN DTOs
    # ============================================================
    WorkItemDTO:
      type: object
      required: [id, organization_id, title, status, source, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        title: { type: string }
        status: { $ref: '#/components/schemas/WorkItemStatus' }
        source: { $ref: '#/components/schemas/WorkItemSource' }
        owner_id: { type: [string, 'null'], format: uuid }
        due_at: { type: [string, 'null'], format: date-time }
        blocking: { type: boolean }
        waiting_for_external: { type: boolean }
        priority_score: { type: [integer, 'null'], description: 'derived/cache' }
        decision_label: 
          anyOf:
            - $ref: '#/components/schemas/DecisionLabel'
            - type: "null"
        priority_reason: { type: string, nullable: true, description: derived/cache }
        source_inbox_item_id: { type: [string, 'null'], format: uuid }
        completed_at: { type: [string, 'null'], format: date-time }
        archived_at: { type: [string, 'null'], format: date-time }
        reopened_at: { type: [string, 'null'], format: date-time }
        version: { type: [integer, 'null'] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    InboxItemDTO:
      type: object
      required: [id, organization_id, source, status, created_at]
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        source: { $ref: '#/components/schemas/InboxItemSource' }
        raw_content: { type: [string, 'null'] }
        status: { $ref: '#/components/schemas/InboxItemStatus' }
        classification: { type: [string, 'null'] }
        suggested_context_json: { type: [object, 'null'] }
        converted_work_item_id: { type: [string, 'null'], format: uuid }
        created_at: { type: string, format: date-time }
        triaged_at: { type: [string, 'null'], format: date-time }
        dismissed_at: { type: [string, 'null'], format: date-time }

    PeopleDTO:
      type: object
      required: [id, organization_id, type, full_name, status, source, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        type: { $ref: '#/components/schemas/PeopleType' }
        full_name: { type: string }
        work_email: { type: [string, 'null'], format: email }
        phone: { type: [string, 'null'] }
        status: { $ref: '#/components/schemas/PeopleStatus' }
        source: { $ref: '#/components/schemas/PeopleSource' }
        notes: { type: [string, 'null'] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    EmployeeProfileDTO:
      type: object
      required: [people_id, employment_status]
      properties:
        people_id: { type: string, format: uuid }
        department: { type: [string, 'null'] }
        position: { type: [string, 'null'] }
        manager_people_id: { type: [string, 'null'], format: uuid }
        employment_status: { $ref: '#/components/schemas/EmploymentStatus' }
        started_at: { type: [string, 'null'], format: date }
        termination_date: { type: [string, 'null'], format: date }

    CandidateProfileDTO:
      type: object
      required: [people_id]
      properties:
        people_id: { type: string, format: uuid }
        pipeline_status: { type: [string, 'null'] }
        source_email_id: { type: [string, 'null'] }
        summary: { type: [string, 'null'] }
        job_opening_ref: { type: [string, 'null'] }

    DocumentDTO:
      type: object
      required: [id, organization_id, file_name, file_path, document_type, status, uploaded_by_user_id, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        file_name: { type: string }
        file_path: { type: string }
        document_type: { $ref: '#/components/schemas/DocumentType' }
        status: { $ref: '#/components/schemas/DocumentStatus' }
        expires_at: { type: [string, 'null'], format: date }
        uploaded_by_user_id: { type: string, format: uuid }
        verified_by_user_id: { type: [string, 'null'], format: uuid }
        applied_extracted_data_json: { type: [object, 'null'] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ContractDTO:
      type: object
      required: [id, organization_id, contract_type, status, person_id, content, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        contract_type: { $ref: '#/components/schemas/ContractType' }
        status: { $ref: '#/components/schemas/ContractStatus' }
        person_id: { type: string, format: uuid }
        template_id: { type: [string, 'null'], format: uuid }
        content: { type: string }
        signed_document_id: { type: [string, 'null'], format: uuid }
        started_on: { type: [string, 'null'], format: date }
        ended_on: { type: [string, 'null'], format: date }
        signed_on: { type: [string, 'null'], format: date }
        parent_contract_id: { type: [string, 'null'], format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TemplateDTO:
      type: object
      required: [id, organization_id, name, type, content, version, is_active, scope, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        name: { type: string }
        type: { $ref: '#/components/schemas/TemplateType' }
        content: { type: string }
        placeholder_schema_json: { type: [object, 'null'] }
        version: { type: integer }
        is_active: { type: boolean }
        scope: { $ref: '#/components/schemas/TemplateScope' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AISuggestionDTO:
      type: object
      required: [id, organization_id, source_entity_type, source_entity_id, suggestion_type, status, confidence_label, created_at]
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        source_entity_type: { $ref: '#/components/schemas/AIEntityType' }
        source_entity_id: { type: string, format: uuid }
        suggestion_type: { $ref: '#/components/schemas/SuggestionType' }
        suggested_data_json: { type: [object, 'null'] }
        confidence_label: { $ref: '#/components/schemas/ConfidenceLabel' }
        status: { $ref: '#/components/schemas/SuggestionStatus' }
        applied_at: { type: [string, 'null'], format: date-time }
        applied_by_user_id: { type: [string, 'null'], format: uuid }
        rejected_at: { type: [string, 'null'], format: date-time }
        rejected_by_user_id: { type: [string, 'null'], format: uuid }
        rejection_reason: { type: [string, 'null'] }
        prompt_run_id: { type: [string, 'null'], format: uuid }
        created_at: { type: string, format: date-time }

    NoteDTO:
      type: object
      required: [id, organization_id, linked_entity_type, linked_entity_id, content, author_id, is_internal, is_pinned, created_at]
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        linked_entity_type: { $ref: '#/components/schemas/EntityType' }
        linked_entity_id: { type: string, format: uuid }
        content: { type: string }
        author_id: { type: string, format: uuid }
        is_internal: { type: boolean }
        is_pinned: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    NotificationDTO:
      type: object
      required: [id, organization_id, type, title, linked_entity_type, linked_entity_id, status, recipient_id, created_at]
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        type: { $ref: '#/components/schemas/NotificationType' }
        title: { type: string }
        message: { type: [string, 'null'] }
        linked_entity_type: { $ref: '#/components/schemas/EntityType' }
        linked_entity_id: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/NotificationStatus' }
        due_at: { type: [string, 'null'], format: date-time }
        recipient_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        read_at: { type: [string, 'null'], format: date-time }

    AuditEventDTO:
      type: object
      required: [id, organization_id, actor_id, action, entity_type, entity_id, source, timestamp]
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        actor_id: { type: string, format: uuid }
        action: { type: string }
        entity_type: { $ref: '#/components/schemas/EntityType' }
        entity_id: { type: string, format: uuid }
        before_json: { type: [object, 'null'] }
        after_json: { type: [object, 'null'] }
        reason: { type: [string, 'null'] }
        context_summary: { type: [string, 'null'] }
        source: { $ref: '#/components/schemas/AuditSource' }
        correlation_id: { type: [string, 'null'] }
        timestamp: { type: string, format: date-time }

    # ============================================================
    # REQUEST DTOs
    # ============================================================
    CreateWorkItemRequest:
      type: object
      required: [title]
      properties:
        title: { type: string }
        owner_id: { type: [string, 'null'], format: uuid }
        due_at: { type: [string, 'null'], format: date-time }
        source: 
          anyOf:
            - $ref: '#/components/schemas/WorkItemSource'
            - type: "null"

    UpdateWorkItemRequest:
      type: object
      properties:
        title: { type: [string, 'null'] }
        owner_id: { type: [string, 'null'], format: uuid }
        due_at: { type: [string, 'null'], format: date-time }
        status: 
          anyOf:
            - $ref: '#/components/schemas/WorkItemStatus'
            - type: "null"
        blocking: { type: [boolean, 'null'] }
        waiting_for_external: { type: [boolean, 'null'] }

    CompleteWorkItemRequest:
      type: object
      properties:
        completion_note: { type: [string, 'null'] }
        outcome: { type: [string, 'null'] }
        follow_up_required: { type: [boolean, 'null'] }

    AssignWorkItemRequest:
      type: object
      required: [owner_id]
      properties:
        owner_id: { type: string, format: uuid }

    SnoozeWorkItemRequest:
      type: object
      required: [until]
      properties:
        until: { type: string, format: date-time }

    ConvertInboxToWorkRequest:
      type: object
      required: [title]
      properties:
        title: { type: string }
        owner_id: { type: [string, 'null'], format: uuid }
        due_at: { type: [string, 'null'], format: date-time }
        classification: { type: [string, 'null'] }

    UploadDocumentRequest:
      type: object
      required: [file, document_type]
      properties:
        file: { type: string, format: binary }
        document_type: { $ref: '#/components/schemas/DocumentType' }
        metadata_json: { type: [object, 'null'] }
        linked_entity_type: 
          anyOf:
            - $ref: '#/components/schemas/EntityType'
            - type: "null"
        linked_entity_id: { type: [string, 'null'], format: uuid }

    CreateContractRequest:
      type: object
      required: [person_id, contract_type, content]
      properties:
        person_id: { type: string, format: uuid }
        contract_type: { $ref: '#/components/schemas/ContractType' }
        template_id: { type: [string, 'null'], format: uuid }
        content: { type: string }
        started_on: { type: [string, 'null'], format: date }
        ended_on: { type: [string, 'null'], format: date }

    AcceptSuggestionRequest:
      type: object
      required: [suggestion_id, expected_type]
      properties:
        suggestion_id: { type: string, format: uuid }
        expected_type:
          type: string
          enum: [classification, summary, priority, draft, extraction]
        apply_payload: { type: [object, 'null'] }

    CreateNoteRequest:
      type: object
      required: [linked_entity_type, linked_entity_id, content]
      properties:
        linked_entity_type: { $ref: '#/components/schemas/EntityType' }
        linked_entity_id: { type: string, format: uuid }
        content: { type: string }
        is_internal: { type: boolean, default: true }

    RejectDocumentRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string }

    LinkEntityRequest:
      type: object
      required: [entity_id]
      properties:
        entity_id: { type: string, format: uuid }
        role: { type: [string, 'null'] }

    LinkWorkRequest:
      type: object
      required: [target_work_item_id, link_type]
      properties:
        target_work_item_id: { type: string, format: uuid }
        link_type: { $ref: '#/components/schemas/WorkLinkType' }

    BulkActionRequest:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items: { type: string, format: uuid }
        payload: { type: [object, 'null'] }

    # ============================================================
    # PAGINATION & JOB
    # ============================================================
    PaginationMeta:
      type: object
      required: [page, size, total]
      properties:
        page: { type: integer }
        size: { type: integer }
        total: { type: integer }

    Job:
      type: object
      required: [job_id, status]
      properties:
        job_id: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/JobStatus' }
        result_url: { type: [string, 'null'] }
        created_at: { type: [string, 'null'], format: date-time }
        completed_at: { type: [string, 'null'], format: date-time }
        error_log: { type: [string, 'null'] }

    # ============================================================
    # ENVELOPES
    # ============================================================
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { $ref: '#/components/schemas/ErrorCode' }
            message: { type: string }
            details: { type: [object, 'null'] }

    SuccessEnvelope:
      type: object
      required: [data]
      properties:
        data: {}
        meta: { type: [object, 'null'] }

    PaginatedEnvelope:
      type: object
      required: [data, meta]
      properties:
        data: { type: array, items: {} }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    # response alias schemas – each wraps SuccessEnvelope with a semantic name
    SuccessEnvelope_Empty:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
    SuccessEnvelope_WorkItemDetail:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/WorkItemDTO'
    SuccessEnvelope_InboxItemDetail:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/InboxItemDTO'
    SuccessEnvelope_PeopleDetail:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PeopleDTO'
    SuccessEnvelope_DocumentDetail:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DocumentDTO'
    SuccessEnvelope_ContractDetail:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ContractDTO'
    SuccessEnvelope_TemplateDetail:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/TemplateDTO'
    SuccessEnvelope_AISuggestionDetail:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AISuggestionDTO'
    SuccessEnvelope_NoteDetail:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/NoteDTO'
    SuccessEnvelope_NotificationDetail:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/NotificationDTO'
    SuccessEnvelope_AuditEventDetail:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AuditEventDTO'
    SuccessEnvelope_TodayView:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
    SuccessEnvelope_JobAccepted:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Job'
    SuccessEnvelope_ReportSummary:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
    SuccessEnvelope_CurrentUser:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
    SuccessEnvelope_UserSession:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
