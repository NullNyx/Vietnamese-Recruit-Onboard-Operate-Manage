services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: vroom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vroom_hr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  vroom-embedding:
    build:
      context: ./vroom-embedding
      dockerfile: Dockerfile
    container_name: vroom-embedding
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - embedding-model-cache:/app/model_cache
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      EMBEDDING_MODEL_NAME: AITeamVN/Vietnamese_Embedding_v2
      MODEL_CACHE_DIR: /app/model_cache
      HF_TOKEN: ${HF_TOKEN:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 600s

  redis:
    image: redis:7
    container_name: vroom-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    container_name: vroom-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      AUTH_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/vroom_hr
      AUTH_REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/vroom_hr
      EMPLOYEE_MINIO_ENDPOINT: minio:9000
      RECRUITMENT_MINIO_ENDPOINT: minio:9000
      EMBEDDING_SERVICE_URL: http://vroom-embedding:8080
      KB_REDIS_URL: redis://redis:6379/0
      KB_MINIO_ENDPOINT: minio:9000
      KB_MINIO_BUCKET: knowledge-base
      KB_EMBEDDING_SERVICE_URL: http://vroom-embedding:8080
      KB_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/vroom_hr
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./backend/config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      vroom-embedding:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: vroom-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.local
    container_name: vroom-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      INTERNAL_API_URL: http://backend:8000
    depends_on:
      - backend

  gmail-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    container_name: vroom-gmail-worker
    restart: unless-stopped
    command: uv run arq src.modules.gmail.worker.WorkerSettings
    env_file:
      - ./backend/.env
    environment:
      AUTH_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/vroom_hr
      AUTH_REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/vroom_hr
      EMPLOYEE_MINIO_ENDPOINT: minio:9000
      RECRUITMENT_MINIO_ENDPOINT: minio:9000
      EMBEDDING_SERVICE_URL: http://vroom-embedding:8080
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./backend/config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  onboarding-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    container_name: vroom-onboarding-worker
    restart: unless-stopped
    command: uv run arq src.modules.onboarding.worker.OnboardingWorkerSettings
    env_file:
      - ./backend/.env
    environment:
      AUTH_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/vroom_hr
      AUTH_REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/vroom_hr
      EMPLOYEE_MINIO_ENDPOINT: minio:9000
      RECRUITMENT_MINIO_ENDPOINT: minio:9000
      EMBEDDING_SERVICE_URL: http://vroom-embedding:8080
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./backend/config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  kb-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    container_name: vroom-kb-worker
    restart: unless-stopped
    command: uv run arq src.modules.knowledge_base.worker.KnowledgeBaseWorkerSettings
    env_file:
      - ./backend/.env
    environment:
      KB_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/vroom_hr
      KB_REDIS_URL: redis://redis:6379/0
      KB_MINIO_ENDPOINT: minio:9000
      KB_MINIO_BUCKET: knowledge-base
      KB_EMBEDDING_SERVICE_URL: http://vroom-embedding:8080
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/vroom_hr
      EMPLOYEE_MINIO_ENDPOINT: minio:9000
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./backend/config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      vroom-embedding:
        condition: service_healthy
volumes:
  postgres_data:
  minio_data:
  embedding-model-cache:
