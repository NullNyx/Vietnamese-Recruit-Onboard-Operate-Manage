name: E2E CI

on:
  push:
    branches: [main, "feature/**"]
    paths:
      - "vroom-hr/**"
      - "backend/**"
      - ".github/workflows/e2e-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "vroom-hr/**"
      - "backend/**"
      - ".github/workflows/e2e-ci.yml"

jobs:
  e2e-smoke:
    name: E2E Smoke (vroom-hr + backend)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vroom_hr
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Backend — database / redis (point to service containers on localhost)
      AUTH_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/vroom_hr
      AUTH_REDIS_URL: redis://localhost:6379/0
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/vroom_hr
      # Backend — auth secrets (CI-only dummy values; no real secrets)
      AUTH_GOOGLE_CLIENT_ID: test-client-id
      AUTH_GOOGLE_CLIENT_SECRET: test-client-secret
      AUTH_JWT_SECRET_KEY: test-jwt-secret-key-for-ci-only
      AUTH_OAUTH_TOKEN_ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS0zMi1ieXRlcw==
      # vroom-hr — API URL (set via Playwright webServer; kept here for clarity)
      NEXT_PUBLIC_API_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      # ── Backend ──────────────────────────────────────────────────────

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/pyproject.toml"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --all-extras

      - name: Run Alembic migrations
        working-directory: backend
        run: uv run alembic upgrade head

      - name: Start backend server (background)
        working-directory: backend
        run: |
          uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 &
          # Wait for backend to accept connections
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:8000/api/auth/setup-status; then
              echo "Backend ready on :8000"
              break
            fi
            sleep 2
          done

      - name: Seed payroll data
        working-directory: backend
        run: uv run python -m scripts.seed_payroll

      # ── Frontend (vroom-hr) ─────────────────────────────────────────

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: vroom-hr/pnpm-lock.yaml

      - name: Install vroom-hr dependencies
        working-directory: vroom-hr
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: vroom-hr
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright E2E smoke tests
        working-directory: vroom-hr
        run: pnpm test:e2e
        env:
          CI: "true"

      # ── Artifacts ───────────────────────────────────────────────────

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: vroom-hr/playwright-report/
          retention-days: 7

      - name: Upload test-results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: vroom-hr/test-results/
          retention-days: 7
